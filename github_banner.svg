<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Personal Knowledge Brain</title>
  <desc id="desc">A banner for a self-hosted Telegram, WhatsApp, n8n, and Obsidian personal knowledge system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071326"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#12343B"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 110) rotate(135) scale(360 260)">
      <stop stop-color="#38BDF8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 330) rotate(-35) scale(300 220)">
      <stop stop-color="#22C55E" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="34" fill="url(#glowA)"/>
  <rect width="1280" height="420" rx="34" fill="url(#glowB)"/>
  <g opacity="0.22">
    <path d="M942 104L1034 66L1138 132L1084 242L958 226L900 156Z" stroke="#E0F2FE" stroke-width="2"/>
    <path d="M1034 66L1084 242M942 104L958 226M900 156L1138 132" stroke="#93C5FD" stroke-width="1.5"/>
    <circle cx="942" cy="104" r="8" fill="#67E8F9"/>
    <circle cx="1034" cy="66" r="8" fill="#A7F3D0"/>
    <circle cx="1138" cy="132" r="8" fill="#C4B5FD"/>
    <circle cx="1084" cy="242" r="8" fill="#67E8F9"/>
    <circle cx="958" cy="226" r="8" fill="#A7F3D0"/>
    <circle cx="900" cy="156" r="8" fill="#C4B5FD"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="78" y="76" width="770" height="268" rx="28" fill="#0B1220" fill-opacity="0.72" stroke="#334155"/>
    <text x="116" y="144" fill="#67E8F9" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3">HERMES</text>
    <text x="116" y="200" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">Personal Knowledge Brain</text>
    <text x="116" y="246" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="23">Telegram · WhatsApp · n8n · Groq · Obsidian</text>
    <text x="116" y="290" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Save anything. Ask later.</text>
    <text x="790" y="292" direction="rtl" unicode-bidi="bidi-override" text-anchor="end" fill="#E0F2FE" font-family="Arial, Tahoma, sans-serif" font-size="23">احفظ أي شيء واسأل عنه لاحقاً</text>
  </g>
  <g transform="translate(910 256)">
    <rect x="0" y="0" width="210" height="54" rx="27" fill="#ECFEFF" fill-opacity="0.12" stroke="#67E8F9" stroke-opacity="0.45"/>
    <text x="105" y="35" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">by @AbOd</text>
  </g>
</svg>
